<!DOCTYPE html>
<html lang="en" data-theme="dark-blue" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E V O CLEVER PHONE POINT - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
    
<body class="login-body">

    <div class="login-universe">
        
        <div class="top-utility-controls">
            <button class="liquid-btn text-btn" id="langToggleBtn" onclick="badiliLughaMfumo()">
                <i class="fa-solid fa-language"></i> <span class="lang-text">Swahili Version</span>
            </button>
            
            <div class="theme-switcher-rack">
                <button class="theme-pill active-pill" onclick="badiliMandhari('dark-blue')" title="Dark Blue Theme">
                    <span class="dot blue-dot"></span> <span class="t-name">Cyber Blue</span>
                </button>
                <button class="theme-pill" onclick="badiliMandhari('pure-dark')" title="Pure Dark Theme">
                    <span class="dot dark-dot"></span> <span class="t-name">Midnight</span>
                </button>
                <button class="theme-pill" onclick="badiliMandhari('royal-gold')" title="Royal Gold Theme">
                    <span class="dot gold-dot"></span> <span class="t-name">Royal Gold</span>
                </button>
                <button class="theme-pill" onclick="badiliMandhari('pure-white')" title="White Theme">
                    <span class="dot white-dot"></span> <span class="t-name">Clean Light</span>
                </button>
            </div>
        </div>

        <div class="spinning-showcase-container">
            <div class="spinning-phone-wrapper phone-left">
                <img src="https://i.postimg.cc/NG2nCqjX/iphone15pro-nyuma.jpg" alt="iPhone 15 Pro Showcase">
            </div>
            
            <div class="brand-hero-center">
                <h1 class="brand-evo-title">E V O</h1>
                <h2 class="brand-sub-title">CLEVER PHONE POINT</h2>
                <div class="liquid-pulse-line"></div>
            </div>
            
            <div class="spinning-phone-wrapper phone-right">
                <img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=500" alt="iPhone 15 Front View">
            </div>
        </div>

        <div class="login-card-glass">
            <div class="card-header-flow">
                <h3 id="loginCardTitle">Authorized Staff Only</h3>
                <p id="loginCardSub">Please fill credentials to unlock the terminal system</p>
            </div>
            
            <form id="loginForm" onsubmit="handleStaffLogin(event)">
                <div class="evo-input-group">
                    <label id="lblUsername"><i class="fa-solid fa-user-shield"></i> Username / Email</label>
                    <div class="input-glow-wrapper">
                        <input type="text" id="usernameInput" required placeholder="Ingiza jina lako...">
                    </div>
                </div>
                
                <div class="evo-input-group">
                    <label id="lblPassword"><i class="fa-solid fa-lock"></i> Passcode / Password</label>
                    <div class="input-glow-wrapper">
                        <input type="password" id="passwordInput" required placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="liquid-star-btn">
                    <span class="liquid-wave"></span>
                    <span class="btn-text" id="btnLoginText"><i class="fa-solid fa-key"></i> UNLOCK SYSTEM</span>
                </button>
            </form>
        </div>
        
    </div>

    <script>
        // Mipangilio ya lugha
        const kamusi = {
            en: {
                langBtn: '<i class="fa-solid fa-language"></i> Kiswahili',
                title: "Authorized Staff Only",
                sub: "Please fill credentials to unlock the terminal system",
                user: '<i class="fa-solid fa-user-shield"></i> Staff Username',
                pass: '<i class="fa-solid fa-lock"></i> Secure Password',
                btn: '<i class="fa-solid fa-key"></i> UNLOCK SYSTEM',
                invalid: "❌ Wrong credentials! Please use username: admin and password: admin"
            },
            sw: {
                langBtn: '<i class="fa-solid fa-language"></i> English',
                title: "Wafanyakazi Walioruhusiwa Tu",
                sub: "Ingiza taarifa zako ili kufungua mashine ya mauzo",
                user: '<i class="fa-solid fa-user-shield"></i> Jina la Mtumiaji',
                pass: '<i class="fa-solid fa-lock"></i> Nywila ya Siri',
                btn: '<i class="fa-solid fa-key"></i> FUNGUA MFUMO',
                invalid: "❌ Umekosea! Tumia jina: admin na password: admin"
            }
        };

        function badiliLughaMfumo() {
            const htmlTag = document.documentElement;
            let sasa = htmlTag.getAttribute('data-lang') || 'en';
            let mpya = (sasa === 'en') ? 'sw' : 'en';
            
            htmlTag.setAttribute('data-lang', mpya);
            
            // Rekebisha maneno kwenye peji hapo hapo
            document.getElementById('langToggleBtn').innerHTML = kamusi[mpya].langBtn;
            document.getElementById('loginCardTitle').innerText = kamusi[mpya].title;
            document.getElementById('loginCardSub').innerText = kamusi[mpya].sub;
            document.getElementById('lblUsername').innerHTML = kamusi[mpya].user;
            document.getElementById('lblPassword').innerHTML = kamusi[mpya].pass;
            document.getElementById('btnLoginText').innerHTML = kamusi[mpya].btn;
        }

        function badiliMandhari(jinaLaTheme) {
            document.documentElement.setAttribute('data-theme', jinaLaTheme);
            
            // Weka alama ya active kwenye kidonge husika
            document.querySelectorAll('.theme-pill').forEach(pill => {
                pill.classList.remove('active-pill');
            });
            event.currentTarget.classList.add('active-pill');
        }

        function handleStaffLogin(e) {
            e.preventDefault();
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const lang = document.documentElement.getAttribute('data-lang') || 'en';

            // Username na Password rahisi za kupenya
            if (user === 'admin' && pass === 'admin') {
                // Tunatunza lugha na theme zisiandikwe upya bosi akihama peji
                localStorage.setItem('evo_theme', document.documentElement.getAttribute('data-theme'));
                localStorage.setItem('evo_lang', lang);
                
                window.location.href = 'dashboard.html';
            } else {
                alert(kamusi[lang].invalid);
            }
        }
        // Logic ya Splash Screen ya Kitajiri
    window.addEventListener('load', function() {
        const filler = document.getElementById('splashFiller');
        const status = document.getElementById('splashStatus');
        const splash = document.getElementById('splash-screen');
        
        // Hatua ya 1: Jaza bar kidogo
        setTimeout(() => {
            filler.style.width = '40%';
            status.innerText = 'Loading Assets...';
        }, 500);

        // Hatua ya 2: Jaza bar karibia mwisho
        setTimeout(() => {
            filler.style.width = '85%';
            status.innerText = 'Syncing Themes...';
        }, 1200);

        // Hatua ya 3: Maliza na uingie kwenye mfumo
        setTimeout(() => {
            filler.style.width = '100%';
            status.innerText = 'System Ready!';
            
            // Ficha Splash kwa unyama
            setTimeout(() => {
                splash.classList.add('splash-hidden');
            }, 500);
        }, 2000);
    });
    </script>
</body>
</html>
